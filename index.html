<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzcelyMSU0DWJjJcvc8vWjixJU7qjX3UXSOrZg-L9nIRNrymhpl7N8KisRQzaZzDZFe7g/exec";

  let currentLimit = 20;
  let editModal;

  document.getElementById("date").valueAsDate = new Date();

  document.addEventListener("DOMContentLoaded", function() {
    editModal = new bootstrap.Modal(document.getElementById("editModal"));
  });

  document.getElementById("expenseForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const payload = {
      action: "create",
      date: document.getElementById("date").value,
      type: document.getElementById("type").value,
      category: document.getElementById("category").value,
      subCategory: document.getElementById("subCategory").value,
      amount: document.getElementById("amount").value,
      notes: document.getElementById("notes").value
    };

    document.getElementById("status").innerText = "Saving...";

    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      document.getElementById("status").innerText = "✅ Saved successfully.";
      document.getElementById("expenseForm").reset();
      document.getElementById("date").valueAsDate = new Date();

      currentLimit = 20;
      setTimeout(loadRecentInputs, 1500);

    } catch (error) {
      document.getElementById("status").innerText = "❌ Error saving entry.";
    }
  });

  document.getElementById("loadMoreBtn").addEventListener("click", function() {
    currentLimit += 20;
    loadRecentInputs();
  });

  async function loadRecentInputs() {
    const table = document.getElementById("recentTable");

    try {
      const response = await fetch(
        WEB_APP_URL +
        "?limit=" +
        currentLimit +
        "&t=" +
        Date.now()
      );

      const data = await response.json();

      table.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        table.innerHTML = "<tr><td colspan='6'>No recent transactions found.</td></tr>";
        return;
      }

data.forEach(row => {
  const tr = document.createElement("tr");
  tr.className = "transaction-row";

  const isMobile = window.innerWidth < 768;

  const displayDate = isMobile
    ? formatShortDate(row.date)
    : row.date;

  const displayType = isMobile
    ? shortType(row.type)
    : row.type;

  const displayCategory = isMobile
    ? shortCategory(row.category)
    : row.category;

  //RM remove small
    const displayAmount = isMobile
    ? row.amount
    : `RM ${row.amount}`;


  tr.innerHTML = `
    <td>${displayDate || ""}</td>
    <td>${displayType || ""}</td>
    <td>${displayCategory || ""}</td>
    <td>${row.subCategory || ""}</td>
    <td class="amount">${displayAmount || ""}</td>
    <td>${row.notes || ""}</td>
  `;

  tr.addEventListener("click", function() {
    openEditModal(row);
  });

  table.appendChild(tr);
});

      document.getElementById("loadMoreBtn").style.display =
        data.length < currentLimit ? "none" : "block";

    } catch (error) {
      table.innerHTML = "<tr><td colspan='6'>Unable to load recent transactions.</td></tr>";
    }
  }

  function openEditModal(row) {
    document.getElementById("editId").value = row.id || "";
    document.getElementById("editDate").value = row.date || "";
    document.getElementById("editType").value = row.type || "";
    document.getElementById("editCategory").value = row.category || "";
    document.getElementById("editSubCategory").value = row.subCategory || "";
    // document.getElementById("editAmount").value = row.amount || "";
    document.getElementById("editAmount").value =
  (row.amount || "").replace(/,/g, "");
    document.getElementById("editNotes").value = row.notes || "";
    document.getElementById("editStatus").innerText = "";

    editModal.show();
  }

  document.getElementById("updateBtn").addEventListener("click", async function() {
    const payload = {
      action: "update",
      id: document.getElementById("editId").value,
      date: document.getElementById("editDate").value,
      type: document.getElementById("editType").value,
      category: document.getElementById("editCategory").value,
      subCategory: document.getElementById("editSubCategory").value,
      amount: document.getElementById("editAmount").value,
      notes: document.getElementById("editNotes").value
    };

    document.getElementById("editStatus").innerText = "Updating...";

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    document.getElementById("editStatus").innerText = "✅ Updated.";
    setTimeout(function() {
      editModal.hide();
      loadRecentInputs();
    }, 800);
  });

  document.getElementById("deleteBtn").addEventListener("click", async function() {
    const confirmDelete = confirm("Delete this transaction?");

    if (!confirmDelete) return;

    const payload = {
      action: "delete",
      id: document.getElementById("editId").value
    };

    document.getElementById("editStatus").innerText = "Deleting...";

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    document.getElementById("editStatus").innerText = "✅ Deleted.";
    setTimeout(function() {
      editModal.hide();
      loadRecentInputs();
    }, 800);
  });

//small screen

  function formatShortDate(dateValue) {
  if (!dateValue) return "";

  return new Date(dateValue).toLocaleDateString("en-GB", {
    day: "2-digit",
    month: "short"
  });
}

function shortType(type) {
  return {
    Expense: "Exp",
    Income: "Inc",
    Transfer: "Tfer",
    Deduction: "Ded"
  }[type] || type;
}

function shortCategory(category) {
  return {
    "Food & Beverage": "Food",
    "Transportation": "Transport",
    "Entertainment": "Fun",
    "Commitments": "Commit",
    "Subscription": "Sub",
    "Investment": "Invest"
  }[category] || category;
}


let refreshTimer = null;



</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLsYGSytzUpaC6-it-ZtDq9eAYNAIqZQY",
  authDomain: "spendingtracker-214d4.firebaseapp.com",
  projectId: "spendingtracker-214d4",
  storageBucket: "spendingtracker-214d4.firebasestorage.app",
  messagingSenderId: "1001402393044",
  appId: "1:1001402393044:web:f9fafee35d2be947757641",
  measurementId: "G-PS4H5GM81T"
};

const allowedEmail = "fakhrulzakry@gmail.com";

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const provider = new GoogleAuthProvider();

window.login = function () {
  signInWithPopup(auth, provider);
};

window.logout = function () {
  signOut(auth);
};

onAuthStateChanged(auth, function(user) {
  if (user && user.email === allowedEmail) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("logoutBtn").style.display = "block";

    loadRecentInputs();

    if (!refreshTimer) {
      refreshTimer = setInterval(loadRecentInputs, 10000);
    }

  } else {
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("app").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";

    if (refreshTimer) {
      clearInterval(refreshTimer);
      refreshTimer = null;
    }

    if (user) {
      alert("Access denied");
      signOut(auth);
    }
  }
});
</script>
