<!DOCTYPE html>
<html>
<head>
  <title>Spending Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      margin-bottom: 20px;
    }

    h2, h3 {
      margin-top: 0;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #2563eb;
      color: white;
      padding: 10px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f7f7f7;
    }

    .amount {
      text-align: right;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>💰 Spending Tracker</h2>

  <form id="expenseForm">

    <input type="date" id="date" required>

    <select id="type" required>
      <option value="Expense">Expense</option>
      <option value="Income">Income</option>
      <option value="Transfer">Transfer</option>
    </select>

    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Income">Income</option>
      <option value="Commitments">Commitments</option>
      <option value="Family">Family</option>
      <option value="Utilities">Utilities</option>
      <option value="Lifestyle">Lifestyle</option>
      <option value="Subscription">Subscription</option>
      <option value="Investment">Investment</option>
    </select>

    <input
      type="text"
      id="subCategory"
      placeholder="Sub-Category"
      required
    >

    <input
      type="number"
      id="amount"
      placeholder="Amount (RM)"
      step="0.01"
      required
    >

    <textarea
      id="notes"
      placeholder="Notes"
    ></textarea>

    <button type="submit">
      Save Transaction
    </button>

  </form>

  <div id="status"></div>

</div>

<div class="card">

  <h3>📋 Recent Transactions</h3>

  <div class="table-container">
    <table>

      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Category</th>
          <th>Sub Category</th>
          <th>Amount</th>
          <th>Notes</th>
        </tr>
      </thead>

      <tbody id="recentTable">
        <tr>
          <td colspan="6">Loading...</td>
        </tr>
      </tbody>

    </table>
  </div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbzcelyMSU0DWJjJcvc8vWjixJU7qjX3UXSOrZg-L9nIRNrymhpl7N8KisRQzaZzDZFe7g/exec";

document.getElementById("date").valueAsDate = new Date();

document
.getElementById("expenseForm")
.addEventListener("submit", async function(e) {

  e.preventDefault();

  const payload = {
    date: document.getElementById("date").value,
    type: document.getElementById("type").value,
    category: document.getElementById("category").value,
    subCategory: document.getElementById("subCategory").value,
    amount: document.getElementById("amount").value,
    notes: document.getElementById("notes").value
  };

  document.getElementById("status").innerText =
    "Saving...";

  try {

    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    document.getElementById("status").innerText =
      "✅ Transaction saved successfully";

    document.getElementById("expenseForm").reset();

    document.getElementById("date").valueAsDate =
      new Date();

    loadRecentInputs();

  } catch (error) {

    document.getElementById("status").innerText =
      "❌ Failed to save transaction";

    console.error(error);
  }
});

async function loadRecentInputs() {

  try {

    const response = await fetch(WEB_APP_URL);

    const data = await response.json();

    const table =
      document.getElementById("recentTable");

    table.innerHTML = "";

    if (!data.length) {

      table.innerHTML = `
        <tr>
          <td colspan="6">
            No transactions found
          </td>
        </tr>
      `;

      return;
    }

    data.forEach(row => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row["Date"] || ""}</td>
        <td>${row["Type"] || ""}</td>
        <td>${row["Category"] || ""}</td>
        <td>${row["Sub-Category"] || ""}</td>
        <td class="amount">
          RM ${row["Amount (RM)"] || ""}
        </td>
        <td>${row["Notes"] || ""}</td>
      `;

      table.appendChild(tr);

    });

  } catch (error) {

    console.error(error);

    document.getElementById("recentTable").innerHTML =
    `
      <tr>
        <td colspan="6">
          Unable to load transactions
        </td>
      </tr>
    `;
  }
}

loadRecentInputs();

setInterval(loadRecentInputs, 10000);

</script>

</body>
</html>
