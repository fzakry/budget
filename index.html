<!DOCTYPE html>
<html>
<head>
  <title>Spending Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h2>Spending Tracker</h2>

  <form id="expenseForm">
    <input type="date" id="date" required>

    <select id="type" required>
      <option value="Expense">Expense</option>
      <option value="Income">Income</option>
      <option value="Transfer">Transfer</option>
    </select>

    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Income">Income</option>
      <option value="Commitments">Commitments</option>
      <option value="Family">Family</option>
      <option value="Utilities">Utilities</option>
      <option value="Lifestyle">Lifestyle</option>
      <option value="Subscription">Subscription</option>
      <option value="Investment">Investment</option>
    </select>

    <input type="text" id="subCategory" placeholder="Sub-Category" required>

    <input type="number" id="amount" placeholder="Amount RM" step="0.01" required>

    <textarea id="notes" placeholder="Notes"></textarea>

    <button type="submit">Save Expense</button>
  </form>

  <p id="status"></p>

  <div class="table-wrap">
    <h3>Recent Transactions</h3>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Month</th>
          <th>Type</th>
          <th>Category</th>
          <th>Sub-Category</th>
          <th>Amount</th>
          <th>Notes</th>
        </tr>
      </thead>

      <tbody id="recentTable">
        <tr>
          <td colspan="7">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzcelyMSU0DWJjJcvc8vWjixJU7qjX3UXSOrZg-L9nIRNrymhpl7N8KisRQzaZzDZFe7g/exec";

    document.getElementById("date").valueAsDate = new Date();

    document.getElementById("expenseForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const payload = {
        date: document.getElementById("date").value,
        type: document.getElementById("type").value,
        category: document.getElementById("category").value,
        subCategory: document.getElementById("subCategory").value,
        amount: document.getElementById("amount").value,
        notes: document.getElementById("notes").value
      };

      document.getElementById("status").innerText = "Saving...";

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        document.getElementById("status").innerText = "Saved successfully.";
        document.getElementById("expenseForm").reset();
        document.getElementById("date").valueAsDate = new Date();

        setTimeout(loadRecentInputs, 1000);

      } catch (error) {
        document.getElementById("status").innerText = "Error saving entry.";
      }
    });

    async function loadRecentInputs() {
      try {
        const response = await fetch(WEB_APP_URL);
        const data = await response.json();

        const table = document.getElementById("recentTable");
        table.innerHTML = "";

        if (!data || data.length === 0) {
          table.innerHTML = '<tr><td colspan="7">No recent transactions found.</td></tr>';
          return;
        }

        data.forEach(row => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>${row["Date"] || ""}</td>
            <td>${row["Month"] || ""}</td>
            <td>${row["Type"] || ""}</td>
            <td>${row["Category"] || ""}</td>
            <td>${row["Sub-Category"] || ""}</td>
            <td>RM ${row["Amount (RM)"] || ""}</td>
            <td>${row["Notes"] || ""}</td>
          `;

          table.appendChild(tr);
        });

      } catch (error) {
        document.getElementById("recentTable").innerHTML =
          '<tr><td colspan="7">Unable to load recent transactions.</td></tr>';
      }
    }

    loadRecentInputs();
    setInterval(loadRecentInputs, 10000);
  </script>
</body>
</html>
